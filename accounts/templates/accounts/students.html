<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Alunos</title>
</head>
<body>
{% extends "accounts/base.html" %}

{% block content %}


{% include "accounts/partials/page_header.html" %}

<table>

    <thead>
    <tr>
        <th>Name</th>
        <th>Status</th>
    </tr>
    </thead>

    <tbody>

    {% for student in students %}

    <tr>

        <td>{{ student.name }}</td>

        <td>

            {% if student.active %}
            ✅ Ativo
            {% else %}
            ❌ Inativo
            {% endif %}

        </td>

    </tr>

    {% endfor %}

    </tbody>

</table>
{% endblock %}


</body>
</html>
